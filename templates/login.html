<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .login-card {
            max-width: 400px;
            margin: auto;
        }
    </style>
</head>

<body class="d-flex align-items-center vh-100">

    <main class="login-card w-100">
        <div class="card shadow">
            <div class="card-body p-4">

                <div class="text-center mb-4">
                    <h2 class="fw-bold">Login</h2>
                    <p class="text-muted">Acesse sua conta</p>
                </div>

                <!-- FORM -->
                <form action="/" method="post">

                    <div class="mb-3">
                        <label class="form-label">Usuário</label>
                        <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" name="password" class="form-control" placeholder="********" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">
                        Entrar
                    </button>

                    <!-- ERRO -->
                    {% if erro %}
                        <div class="alert alert-danger mt-3 text-center">
                            {{ erro }}
                        </div>
                    {% endif %}

                </form>

                <div class="text-center mt-3">
                    <a href="#" class="small text-decoration-none">Esqueceu a senha?</a>
                </div>

            </div>
        </div>

        <p class="text-center mt-4 text-muted small">
            &copy; 2026 BovoTech - Gerenciador de Uniformes
        </p>
    </main>

</body>
</html>
