<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Gerenciador de Uniformes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        .sidebar {
            height: 100vh;
            background-color: #0d6efd;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 15px;
        }

        .sidebar a:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h4 class="text-white text-center mt-3">BovoTech</h4>
            <hr class="text-white">

            <a href="#">📊 Dashboard</a>
            <a href="#">👕 Uniformes</a>
            <a href="cadastrar">➕ Cadastrar</a>
            <a href="logout">🚪 Sair</a>
        </div>

        <!-- CONTEÚDO -->
        <div class="col-md-10 p-4">

            <!-- NAVBAR -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Painel Principal</h2>
                <span>Olá, Usuário 👋</span>
            </div>

            <!-- CARDS -->
            <div class="row mb-4">

                <div class="col-md-4">
                    <div class="card text-white bg-primary shadow">
                        <div class="card-body">
                            <h5>Total de Uniformes</h5>
                            <h2>120</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-white bg-success shadow">
                        <div class="card-body">
                            <h5>Entradas</h5>
                            <h2>30</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-white bg-danger shadow">
                        <div class="card-body">
                            <h5>Saídas</h5>
                            <h2>15</h2>
                        </div>
                    </div>
                </div>

            </div>

            <!-- TABELA -->
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="mb-3">Lista de Uniformes</h5>

                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Tamanho</th>
                                <th>Quantidade</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>Camiseta</td>
                                <td>M</td>
                                <td>50</td>
                            </tr>
                            <tr>
                                <td>2</td>
                                <td>Calça</td>
                                <td>G</td>
                                <td>30</td>
                            </tr>
                        </tbody>
                    </table>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
